<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${employee.name} + ' | еӢӨжҖ '">еӢӨжҖ </title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <h1 th:text="${employee.name} + ' гҒ•гӮ“гҒ®еӢӨжҖ '">еӢӨжҖ </h1>
    <p class="subtitle"><a th:href="@{/}">вҶҗ зӨҫе“ЎдёҖиҰ§</a></p>
</header>
<main>
    <div class="actions">
        <form th:action="@{'/employees/' + ${employee.id} + '/clock-in'}" method="post">
            <button type="submit" class="btn btn-in">еҮәеӢӨжү“еҲ»</button>
        </form>
        <form th:action="@{'/employees/' + ${employee.id} + '/clock-out'}" method="post" class="inline">
            дј‘жҶ©<input type="number" name="breakMinutes" value="60" min="0" class="mini">еҲҶ
            <button type="submit" class="btn btn-out">йҖҖеӢӨжү“еҲ»</button>
        </form>
    </div>

    <section class="summary-card">
        <h2 th:text="${summary.year} + 'е№ҙ' + ${summary.month} + 'жңҲ йӣҶиЁҲ'">д»ҠжңҲйӣҶиЁҲ</h2>
        <div class="summary-grid">
            <div><span>еҮәеӢӨж—Ҙж•°</span><strong th:text="${summary.daysPresent} + 'ж—Ҙ'">0ж—Ҙ</strong></div>
            <div><span>еҠҙеғҚжҷӮй–“</span><strong th:text="${summary.workedLabel()}">0:00</strong></div>
            <div><span>ж®ӢжҘӯжҷӮй–“</span><strong class="ot" th:text="${summary.overtimeLabel()}">0:00</strong></div>
            <div><span>ж·ұеӨңжҷӮй–“</span><strong class="night" th:text="${summary.lateNightLabel()}">0:00</strong></div>
        </div>
    </section>

    <h2>еӢӨжҖ иЁҳйҢІ</h2>
    <table class="data-table">
        <thead>
        <tr><th>ж—Ҙд»ҳ</th><th>еҮәеӢӨ</th><th>йҖҖеӢӨ</th><th>дј‘жҶ©</th><th>еҠҙеғҚ</th><th>ж®ӢжҘӯ</th><th>ж·ұеӨң</th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${rows}" th:classappend="${!r.closed()} ? 'open-row'">
            <td th:text="${#temporals.format(r.date(), 'MM/dd (E)')}">06/01</td>
            <td th:text="${r.clockIn() != null} ? ${#temporals.format(r.clockIn(), 'HH:mm')} : 'вҖ”'">09:00</td>
            <td th:text="${r.clockOut() != null} ? ${#temporals.format(r.clockOut(), 'HH:mm')} : 'вҖ”'">18:00</td>
            <td th:text="${r.breakMinutes()} + 'еҲҶ'">60еҲҶ</td>
            <td th:text="${r.workedLabel()}">8:00</td>
            <td class="ot" th:text="${r.overtimeLabel()}">0:00</td>
            <td class="night" th:text="${r.lateNightLabel()}">0:00</td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(rows)}" class="hint">иЁҳйҢІгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ</p>
</main>
</body>
</html>
