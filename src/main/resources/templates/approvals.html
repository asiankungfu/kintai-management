<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>承認待ち</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <h1>承認待ち一覧</h1>
    <p class="subtitle">承認者: <span th:text="${approver.name}">山田</span> ・ <a th:href="@{/}">← 社員一覧</a></p>
</header>
<main>
    <table class="data-table">
        <thead>
        <tr><th>申請ID</th><th>申請者</th><th>種別</th><th>対象日</th><th>時間</th><th>理由</th><th>操作</th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${pending}">
            <td th:text="${r.id}">1</td>
            <td th:text="${r.applicantId}">2</td>
            <td th:text="${r.type.label}">残業</td>
            <td th:text="${#temporals.format(r.targetDate, 'yyyy/MM/dd')}">日付</td>
            <td th:text="${r.minutes} + '分'">分</td>
            <td th:text="${r.reason}">理由</td>
            <td class="decision">
                <form method="post" th:action="@{'/approvals/' + ${r.id} + '/approve'}" class="inline">
                    <input type="hidden" name="approverId" th:value="${approver.id}">
                    <input type="text" name="comment" placeholder="コメント" class="mini-text">
                    <button type="submit" class="btn btn-in">承認</button>
                </form>
                <form method="post" th:action="@{'/approvals/' + ${r.id} + '/reject'}" class="inline">
                    <input type="hidden" name="approverId" th:value="${approver.id}">
                    <button type="submit" class="btn btn-out">却下</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(pending)}" class="hint">承認待ちの申請はありません。</p>
</main>
</body>
</html>
