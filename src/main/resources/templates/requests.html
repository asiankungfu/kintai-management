<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${employee.name} + ' | 申請'">申請</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <h1 th:text="${employee.name} + ' さんの申請'">申請</h1>
    <p class="subtitle"><a th:href="@{/}">← 社員一覧</a></p>
</header>
<main>
    <section class="form-card">
        <h2>新規申請</h2>
        <form th:action="@{'/employees/' + ${employee.id} + '/requests'}" method="post" class="stack">
            <label>種別
                <select name="type">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t.label}">残業</option>
                </select>
            </label>
            <label>対象日 <input type="date" name="targetDate" required></label>
            <label>時間(分) <input type="number" name="minutes" value="0" min="0"></label>
            <label>理由 <input type="text" name="reason" maxlength="500"></label>
            <button type="submit" class="btn btn-in">申請する</button>
        </form>
    </section>

    <h2>申請履歴</h2>
    <table class="data-table">
        <thead>
        <tr><th>種別</th><th>対象日</th><th>時間</th><th>理由</th><th>状態</th><th>操作</th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${requests}">
            <td th:text="${r.type.label}">残業</td>
            <td th:text="${#temporals.format(r.targetDate, 'yyyy/MM/dd')}">日付</td>
            <td th:text="${r.minutes} + '分'">分</td>
            <td th:text="${r.reason}">理由</td>
            <td>
                <span class="badge" th:classappend="${r.status.name().toLowerCase()}" th:text="${r.status.label}">状態</span>
            </td>
            <td>
                <form th:if="${r.status.name() == 'PENDING'}" method="post"
                      th:action="@{'/employees/' + ${employee.id} + '/requests/' + ${r.id} + '/cancel'}">
                    <button type="submit" class="btn btn-mini">取下げ</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
